<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 300" width="340" height="300" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700&amp;family=Poppins:ital,wght@1,300&amp;display=swap');
    </style>
  </defs>

  <!-- ══════════════════════════════════════ -->
  <!--  ILLUSTRATION  (centered ~170, 20-170) -->
  <!-- ══════════════════════════════════════ -->

  <!-- Mountains left (tall peak) -->
  <path d="M 82 148 L 108 88 L 134 148 Z"
        stroke="white" stroke-width="1.4" stroke-linejoin="round" fill="none"/>
  <!-- Mountains right (shorter peak) -->
  <path d="M 118 148 L 138 110 L 158 148 Z"
        stroke="white" stroke-width="1.4" stroke-linejoin="round" fill="none"/>
  <!-- Snow cap on left peak -->
  <path d="M 108 88 L 116 105 L 100 105 Z"
        stroke="white" stroke-width="1.1" stroke-linejoin="round" fill="none"/>

  <!-- Globe (right side) -->
  <circle cx="222" cy="98" r="28"
          stroke="white" stroke-width="1.4" fill="none"/>
  <!-- Globe vertical center line -->
  <path d="M 222 70 Q 222 98 222 126"
        stroke="white" stroke-width="1.1" fill="none"/>
  <!-- Globe horizontal center line -->
  <path d="M 194 98 Q 222 98 250 98"
        stroke="white" stroke-width="1.1" fill="none"/>
  <!-- Globe latitude top -->
  <path d="M 197 83 Q 222 78 247 83"
        stroke="white" stroke-width="0.9" fill="none"/>
  <!-- Globe latitude bottom -->
  <path d="M 197 113 Q 222 118 247 113"
        stroke="white" stroke-width="0.9" fill="none"/>
  <!-- Globe longitude left -->
  <path d="M 208 71 Q 202 98 208 125"
        stroke="white" stroke-width="0.9" fill="none"/>
  <!-- Globe longitude right -->
  <path d="M 236 71 Q 242 98 236 125"
        stroke="white" stroke-width="0.9" fill="none"/>

  <!-- Compass rose (center) -->
  <!-- Outer circle -->
  <circle cx="170" cy="120" r="32"
          stroke="white" stroke-width="1.3" fill="none"/>
  <!-- Inner circle -->
  <circle cx="170" cy="120" r="8"
          stroke="white" stroke-width="1.1" fill="none"/>
  <!-- Compass N point (top) -->
  <path d="M 170 88 L 164 116 L 170 112 L 176 116 Z"
        stroke="white" stroke-width="1.1" stroke-linejoin="round" fill="white" fill-opacity="0.9"/>
  <!-- Compass S point (bottom) -->
  <path d="M 170 152 L 164 124 L 170 128 L 176 124 Z"
        stroke="white" stroke-width="1.1" stroke-linejoin="round" fill="white" fill-opacity="0.5"/>
  <!-- Compass E point (right) -->
  <path d="M 202 120 L 178 114 L 182 120 L 178 126 Z"
        stroke="white" stroke-width="1.1" stroke-linejoin="round" fill="white" fill-opacity="0.5"/>
  <!-- Compass W point (left) -->
  <path d="M 138 120 L 162 114 L 158 120 L 162 126 Z"
        stroke="white" stroke-width="1.1" stroke-linejoin="round" fill="white" fill-opacity="0.5"/>
  <!-- Compass diagonal ticks -->
  <line x1="147" y1="97" x2="152" y2="102" stroke="white" stroke-width="1"/>
  <line x1="193" y1="97" x2="188" y2="102" stroke="white" stroke-width="1"/>
  <line x1="147" y1="143" x2="152" y2="138" stroke="white" stroke-width="1"/>
  <line x1="193" y1="143" x2="188" y2="138" stroke="white" stroke-width="1"/>

  <!-- Winding road / river path across bottom of illustration -->
  <path d="M 80 155 C 105 148, 130 160, 155 152 C 180 144, 205 158, 230 152 C 245 148, 255 155, 262 150"
        stroke="white" stroke-width="1.4" fill="none" stroke-linecap="round"/>

  <!-- Water waves (bottom right) -->
  <path d="M 230 162 Q 237 158 244 162 Q 251 166 258 162"
        stroke="white" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <path d="M 234 170 Q 241 166 248 170 Q 255 174 262 170"
        stroke="white" stroke-width="1.3" fill="none" stroke-linecap="round"/>

  <!-- Small decorative dots -->
  <circle cx="170" cy="120" r="2.5" fill="white"/>

  <!-- ══════════════════════════════════════ -->
  <!--  WORDMARK                              -->
  <!-- ══════════════════════════════════════ -->

  <!-- VIVANTE — Syne Bold, wide tracking -->
  <text x="170" y="218"
        font-family="Syne, 'Arial Black', sans-serif"
        font-weight="700"
        font-size="52"
        letter-spacing="8"
        text-anchor="middle"
        fill="white">VIVANTE</text>

  <!-- Tagline — Poppins Light Italic -->
  <text x="170" y="248"
        font-family="Poppins, 'Helvetica Neue', sans-serif"
        font-weight="300"
        font-style="italic"
        font-size="13.5"
        letter-spacing="1.5"
        text-anchor="middle"
        fill="white">viaja más. planifica menos</text>

</svg>
